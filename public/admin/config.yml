backend:
  name: git-gateway
  branch: main
  
media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "settings"
    label: "إعدادات الموقع"
    files:
      - file: "src/content/config.json"
        label: "الهوية والتواصل"
        name: "config"
        fields:
          - {label: "اسم الموقع", name: "siteTitle", widget: "string", default: "متجر منتجاتي"}
          - {label: "لوجو الموقع", name: "logo", widget: "image", required: false}
          - {label: "وصف الموقع", name: "description", widget: "text", required: false}
          - {label: "رقم الواتساب (مع مفتاح الدولة)", name: "whatsapp", widget: "string", required: false, hint: "مثال: 966501234567 - يجب تعبئة الرقم لعرض زر واتساب"}
          - {label: "البريد الإلكتروني", name: "email", widget: "string", required: false, hint: "مثال: info@example.com"}

  - name: "products"
    label: "المنتجات"
    folder: "src/content/products"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "اسم المنتج", name: "title", widget: "string"}
      - {label: "رابط شراء المنتج", name: "bikilikaLink", widget: "string", hint: "رابط المنصة أو المتجر"}
      - {label: "السعر", name: "price", widget: "string", hint: "مثال: 199 ريال"}
      - label: "صور المنتج (سلايدر)"
        name: "images"
        widget: "list"
        field: {label: "صورة", name: "image", widget: "image"}
        required: false
      - {label: "وصف مختصر", name: "description", widget: "text", required: false}
      - {label: "وصف تفصيلي", name: "body", widget: "markdown", required: false}

  - name: "pages"
    label: "الصفحات"
    folder: "src/content/pages"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "عنوان الصفحة", name: "title", widget: "string"}
      - {label: "الرابط (Slug) - استخدم أحرفاً إنجليزية فقط", name: "slug", widget: "string", pattern: ["^[a-z0-9-]+$", "أحرف إنجليزية صغيرة وأرقام وشرطات فقط"], hint: "مثال: about-us"}
      - {label: "المحتوى", name: "body", widget: "markdown"}